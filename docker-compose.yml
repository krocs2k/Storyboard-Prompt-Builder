version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - storyboard-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storyboard_prompt_builder
      POSTGRES_USER: spb_user
      POSTGRES_PASSWORD: changeme_strong_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spb_user -d storyboard_prompt_builder']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped

volumes:
  storyboard-data:
  postgres-data:
  # redis-data:
